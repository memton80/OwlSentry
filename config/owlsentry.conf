# /etc/owlsentry/owlsentry.conf — configuration du démon OwlSentry (TOML).
# Toute valeur absente reprend sa valeur par défaut.

[general]
# Langue des messages d'alerte : "fr" ou "en".
language = "fr"
# Journaux (rotation quotidienne assurée par le démon, purge par logrotate).
log_dir = "/var/log/owlsentry"
# Niveau : trace | debug | info | warn | error (syntaxe EnvFilter acceptée).
log_level = "info"
# Socket Unix de communication avec la GUI (0660 root:owlsentry).
socket_path = "/run/owlsentry/owlsentry.sock"
socket_group = "owlsentry"
# Règles de détection personnalisables.
rules_path = "/etc/owlsentry/rules.toml"
# Nombre d'alertes conservées en mémoire pour l'historique de la GUI.
recent_buffer = 1000

[audit]
enabled = true
audit_log = "/var/log/audit/audit.log"
poll_interval_ms = 500

[filesystem]
enabled = true
# Répertoires surveillés récursivement (inotify). Ajouter "/home" est
# possible mais coûteux sur de gros volumes.
watch_paths = [
    "/etc",
    "/usr/bin",
    "/usr/sbin",
    "/usr/local/bin",
    "/var/log",
    "/tmp",
    "/dev/shm",
]
# Anti-rafale : une alerte au plus par chemin toutes les N secondes.
debounce_secs = 5

[network]
enabled = true
poll_interval_secs = 5
# Scan de ports : nombre de ports distincts sondés par une même IP…
port_scan_threshold = 15
# …dans cette fenêtre glissante (secondes).
port_scan_window_secs = 30
alert_new_listener = true
# Blocage automatique via firewalld (règle riche temporaire). Désactivé par
# défaut : à activer consciemment après avoir renseigné rules.toml
# (network.never_block) pour éviter de bloquer un partenaire légitime.
firewalld_block = false
block_duration_secs = 3600

[process]
enabled = true
scan_interval_secs = 30
